{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card">
                <h2 class="mb-4">Welcome Back</h2>
                {% if invalid %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ invalid }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endif %}
                <form action="/login" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input autocomplete="off" autofocus class="form-control" id="username" name="username" placeholder="Enter your username" type="text" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input class="form-control" id="password" name="password" placeholder="Enter your password" type="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Log In</button>
                </form>
                <hr class="my-4">
                <p class="text-center mb-0">
                    Don't have an account? <a href="/register">Register here</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
